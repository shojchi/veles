provider: "gemini"  # "gemini" | "anthropic" — switch here to change globally

models:
  orchestrator:
    model: "gemini-2.5-flash-lite"
    max_tokens: 512
    temperature: 0.0         # deterministic routing
    pricing: {input_per_1m: 0.075, output_per_1m: 0.30}

  code:
    model: "gemini-2.5-flash-lite"
    max_tokens: 4096
    temperature: 0.2
    pricing: {input_per_1m: 0.075, output_per_1m: 0.30}

  pkm:
    model: "gemini-2.5-flash-lite"
    max_tokens: 4096
    temperature: 0.4
    pricing: {input_per_1m: 0.075, output_per_1m: 0.30}

  writing:
    model: "gemini-2.5-flash-lite"
    max_tokens: 4096
    temperature: 0.6
    pricing: {input_per_1m: 0.075, output_per_1m: 0.30}

  planning:
    model: "gemini-2.5-flash-lite"
    max_tokens: 2048
    temperature: 0.1
    pricing: {input_per_1m: 0.075, output_per_1m: 0.30}

  # Embeddings always use Gemini regardless of provider
  embeddings:
    model: "gemini-embedding-001"
    provider: "gemini"
    dimensions: 3072
    pricing: {input_per_1m: 0.025, output_per_1m: 0.0}

# --- Anthropic equivalents (swap provider above to use) ---
