<div class="overflow-y-auto px-8 py-8 no-scrollbar flex-1">
  <div class="max-w-3xl mx-auto">
    <div class="flex items-start justify-between mb-1">
      <h1 class="text-xl font-headline font-semibold text-on-surface leading-tight">{{ note.title }}</h1>
      <button class="shrink-0 ml-4 text-outline/30 hover:text-error transition-colors p-1 rounded"
              onclick="deleteNote('{{ note.path.stem }}', '{{ note.title | e }}')"
              title="Delete note">
        <span class="material-symbols-outlined" style="font-size:1.125rem;line-height:1">delete</span>
      </button>
    </div>
    <p class="font-label text-[0.725rem] text-outline/40 uppercase tracking-wide mb-8">{{ age }}</p>
    <div class="ai-prose note-md text-sm leading-relaxed" data-raw="{{ note.body | e }}"></div>
  </div>
</div>
