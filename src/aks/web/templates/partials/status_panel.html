<!-- Provider card -->
<div class="bg-surface-container-high/40 p-5 rounded border border-outline-variant/10 space-y-4">
  <div class="flex items-center gap-2">
    <span class="font-mono text-[0.725rem] tracking-wider uppercase text-outline/80">Provider</span>
  </div>
  <div class="font-monoGoogle text-lg font-black text-on-surface uppercase">
    {{ provider }}
  </div>
</div>

<!-- Token usage card -->
<div class="bg-surface-container-high/40 p-5 rounded border border-outline-variant/10 space-y-4">
  <div class="flex items-center gap-2">
    <span class="font-mono text-[0.725rem] tracking-wider uppercase text-outline/80">Token Usage</span>
  </div>
  <div>
    <p class="font-mono text-[0.5725rem] uppercase text-outline/60 mb-1">Today</p>
    <p class="text-xl font-bold tracking-tight text-on-surface font-mono cursor-default" title="{{ '{:,}'.format(today_tokens).replace(',', ' ') }} of {{ '{:,}'.format(token_limit).replace(',', ' ') }}">{{ today_tokens | fmt_tokens }} <span class="text-outline/40 text-sm font-normal">/ {{ token_limit | fmt_tokens }}</span></p>
  </div>
  <div class="space-y-2">
    <div class="h-[2px] bg-outline-variant/10 rounded-full overflow-hidden">
      <div id="token-bar-fill" class="h-full bg-primary transition-all duration-500" style="width: {{ token_pct }}%"></div>
    </div>
    <div class="flex justify-between font-mono text-[0.5725rem] uppercase cursor-pointer select-none"
         onclick="toggleTokenMode(this)"
         data-mode="used"
         data-used-pct="{{ '%.2f' | format(token_pct) }}"
         data-left-pct="{{ '%.2f' | format(100 - token_pct) }}">
      <span class="text-outline/40">Cerebras</span>
      <span id="token-pct-label" class="text-tertiary"><span id="token-pct-prefix" class="text-outline/40">used: </span>{{ "%.2f" | format(token_pct) }}%</span>
    </div>
  </div>
  <script>
    function toggleTokenMode(el) {
      const bar = document.getElementById('token-bar-fill');
      const prefix = document.getElementById('token-pct-prefix');
      const label = document.getElementById('token-pct-label');
      const isUsed = el.dataset.mode === 'used';
      el.dataset.mode = isUsed ? 'left' : 'used';
      const pct = isUsed ? el.dataset.leftPct : el.dataset.usedPct;
      bar.style.width = pct + '%';
      prefix.textContent = isUsed ? 'left: ' : 'used: ';
      label.textContent = pct + '%';
      label.prepend(prefix);
    }
  </script>
</div>

<!-- Active agents -->
<div class="space-y-4">
  <div class="flex items-center gap-2">
    <span class="font-mono text-[0.725rem] tracking-widest uppercase text-on-surface/60">Active Agents</span>
  </div>
  <div class="space-y-0.5">
    {% for name in ["router", "pkm", "code", "writing", "planning"] %}
    <div class="flex justify-between items-center py-2 px-1 font-mono text-[0.725rem] border-b border-outline-variant/5 last:border-0">
      <span class="uppercase text-on-surface/70 tracking-wider">{{ name }}</span>
      <span class="uppercase text-outline/35">Idle</span>
    </div>
    {% endfor %}
  </div>
</div>

<!-- System health -->
<div>
  <div class="bg-surface-container-high/20 p-3 rounded border border-primary/5">
    <div class="flex items-center gap-2 mb-2">
      <span class="text-[0.725rem] font-mono uppercase text-on-surface/60 tracking-wider">System Health</span>
    </div>
    <div class="flex justify-between items-center font-mono text-[0.725rem]">
      <span class="text-outline/50 uppercase">Status</span>
      <span class="text-success">Online</span>
    </div>
  </div>
</div>
