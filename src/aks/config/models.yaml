fallback_chain:
  - name: cerebras
    type: openai_compat
    base_url: https://api.cerebras.ai/v1
    api_key_env: CEREBRAS_API_KEY
    model: llama3.1-8b

  - name: gemini
    type: gemini
    api_key_env: GEMINI_API_KEY
    model: gemini-2.5-flash-lite

  - name: groq
    type: openai_compat
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY
    model: llama-3.1-8b-instant

  - name: mistral
    type: openai_compat
    base_url: https://api.mistral.ai/v1
    api_key_env: MISTRAL_API_KEY
    model: mistral-small-latest

models:
  orchestrator:
    max_tokens: 512
    temperature: 0.0

  code:
    max_tokens: 4096
    temperature: 0.2

  pkm:
    max_tokens: 4096
    temperature: 0.4

  writing:
    max_tokens: 4096
    temperature: 0.6

  planning:
    max_tokens: 2048
    temperature: 0.1

  # Embeddings always use Gemini regardless of fallback chain
  embeddings:
    model: gemini-embedding-001
    provider: gemini
    dimensions: 3072
